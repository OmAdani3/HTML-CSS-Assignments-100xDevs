<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="Log-In" class="flex-col">
    <div id="heading" class="flex-col">
        <h4>llElevenLabs</h4>
    </div>


    <div id="account">
        <h3>Create an account</h3>
    </div>

    <div id="google-signup">
        <img src="Google img.png" alt="Google image">
        <span>Sign up with Google</span>
    </div>

    <div class="underline"></div>
    
    <div class="form flex-col" >
    <label>Email:</label>
    <input type="email" name="email" id="email">

    <label>Password:</label>
    <input type="password" name="password" id="password">
</div>
    <button>Sign Up</button>

    <span>Already registered? Sign in</span>
</div>

<div class="copyright-claim"> By continuing, you agree to our Terms of Service and Privacy Policy.</div>
</body>
</html>
